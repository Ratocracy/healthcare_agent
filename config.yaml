# Healthcare AI drafting pipeline configuration

paths:
  input_path: physician_copilot_student_cases.json
  output_dir: outputs
  outbox_path: outputs/outbox.json
  audit_trail_path: outputs/audit_trail.json

run:
  append_outputs: true
  top_n_findings: null
  dry_run: false
  case_id: null
  save_raw_safety_output: true
  save_initial_draft: true

model:
  draft_model: gpt-4o-mini
  safety_model: gpt-4o-mini
  draft_temperature: 0.3
  safety_temperature: 0.0
  max_retries: 1

prompts:
  prompt_version: v1
  draft_system_message: >-
    You are a cautious clinical assistant drafting messages for physician review.
    You must avoid diagnosis, medication advice, and overconfident claims.
  safety_system_message: >-
    You are a strict healthcare safety reviewer. Return JSON only.

fallbacks:
  safety_fallback_message: >-
    I reviewed your recent test results and would like to discuss them with you.
    Please schedule a follow-up appointment so we can review the findings and next steps together.

lab_ranges:
  LDL:
    borderline: 130
    high: 160
    very_high: 190
  HDL:
    low: 40
    good: 60
  Triglycerides:
    high: 150
    very_high: 500
  A1c:
    prediabetes: 5.7
    diabetes_level: 6.5
    urgent: 10.0
  Creatinine:
    high: 1.3
    very_high: 2.0
  eGFR:
    low: 60
    very_low: 30
  ALT:
    high: 55
    very_high: 150
  AST:
    high: 40
    very_high: 150
  Vitamin D:
    deficient: 20
    insufficient: 30
